<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Scheduler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .team-member {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .team-member:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            background: rgba(255, 255, 255, 1);
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2em;
            color: white;
            font-weight: bold;
        }

        .member-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .member-role {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .schedule-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .schedule-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 85%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        .iframe-container {
            flex: 1;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .scheduler-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Configuration Panel */
        .config-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            display: none; /* Hidden by default */
        }

        .config-title {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 600;
        }

        .config-item {
            margin-bottom: 15px;
        }

        .config-item label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .config-item input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 0.9em;
            transition: border-color 0.3s ease;
        }

        .config-item input:focus {
            outline: none;
            border-color: #667eea;
        }

        .save-config-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-config-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .member-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .member-info {
            flex-grow: 1;
        }

        .member-info .name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .member-info .role {
            color: #666;
            font-size: 0.9em;
        }

        .delete-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(231, 76, 60, 0.4);
        }

        @media (max-width: 768px) {
            .modal-content {
                width: 95%;
                height: 90%;
            }
            
            .team-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 15px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Team Scheduler</h1>
        <div value="toggle-control" display="none" hidden>
            <button onclick="showConfigPanel();" value="Show Config">Show Config</button>
            <button onclick="hideConfigPanel();" value="Hide Config">Hide Config</button>
        </div>
        <div class="team-grid" id="teamGrid">
            <!-- Team members will be dynamically generated -->
        </div>

        <div class="config-panel" id="configPanel">
            <h3 class="config-title">Configuration</h3>
            <div class="config-item">
                <label for="defaultUrl">Default Scheduler URL:</label>
                <input type="url" id="defaultUrl" placeholder="https://calendly.com/your-link or zoom scheduler URL">
            </div>
            <div class="config-item">
                <label for="newMemberName">Add Team Member:</label>
                <input type="text" id="newMemberName" placeholder="Enter member name">
            </div>
            <div class="config-item">
                <label for="newMemberRole">Member Role:</label>
                <input type="text" id="newMemberRole" placeholder="Enter member role">
            </div>
            <div class="config-item">
                <label for="newMemberUrl">Member Scheduler URL (optional):</label>
                <input type="url" id="newMemberUrl" placeholder="Custom URL for this member" oninput="handleUrlInput()">
            </div>
            <button class="save-config-btn" onclick="addTeamMember()">Add Team Member</button>
            
            <div class="config-item" style="margin-top: 30px;">
                <label>Current Team Members:</label>
                <div id="membersList" style="max-height: 200px; overflow-y: auto; border: 2px solid #e1e5e9; border-radius: 8px; padding: 10px; margin-top: 10px;">
                    <!-- Team members list will be populated here -->
                </div>
            </div>
            
            <button class="save-config-btn" onclick="hideConfigPanel()" style="margin-left: 10px; background: linear-gradient(135deg, #e74c3c, #c0392b);">Hide Config</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="schedulerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Schedule with Team Member</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="iframe-container">
                <iframe id="schedulerIframe" class="scheduler-iframe" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // Default team members data
        let teamMembers = [
            {
                name: "Justin Yao",
                role: "Team Manager",
                url: "",
                initials: "SJ",
                color: "linear-gradient(135deg, #ff6b6b, #ee5a24)"
            },
            {
                name: "Dennis Medeiros",
                role: "CSE",
                url: "https://scheduler.zoom.us/veracode-dmedeiros",
                initials: "DMe",
                color: "linear-gradient(135deg, #4ecdc4, #44bd87)"
            },
            {
                name: "Ricardo Alvares Pereira Junior",
                role: "CSE",
                url: "",
                initials: "RAPJ",
                color: "linear-gradient(135deg, #a55eea, #8e44ad)"
            },
            {
                name: "Thomas Fahey",
                role: "CSE",
                url: "https://scheduler.zoom.us/thomas-fahey",
                initials: "TF",
                color: "linear-gradient(135deg, #ffa726, #fb8c00)"
            },
             {
                name: "Ben Halpern",
                role: "CSE",
                url: "https://scheduler.zoom.us/veracode-cse-ben-halpern",
                initials: "BH",
                color: "linear-gradient(135deg, #ffa726, #fb8c00)"
            },
              {
                name: "John Paul Bryant",
                role: "CSE",
                url: "https://scheduler.zoom.us/johnpaul",
                initials: "JPB",
                color: "linear-gradient(135deg, #ffa726, #fb8c00)"
            },
              {
                name: "Daniel Marquez",
                role: "CSE",
                url: "https://scheduler.zoom.us/dmarquez",
                initials: "DMa",
                color: "linear-gradient(135deg, #ffa726, #fb8c00)"
            }
        ];

        // Show/Hide configuration panel functions
        function showConfigPanel() {
            document.getElementById('configPanel').style.display = 'block';
            updateMembersList(); // Update the members list when showing config
        }

        function hideConfigPanel() {
            document.getElementById('configPanel').style.display = 'none';
        }

        // Update the members list in config panel
        function updateMembersList() {
            const membersList = document.getElementById('membersList');
            
            if (teamMembers.length === 0) {
                membersList.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">No team members added yet.</p>';
                return;
            }
            
            membersList.innerHTML = teamMembers.map((member, index) => `
                <div class="member-list-item">
                    <div class="member-info">
                        <div class="name">${member.name}</div>
                        <div class="role">${member.role}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteMember(${index})" title="Delete ${member.name}">
                        Delete
                    </button>
                </div>
            `).join('');
        }

        // Delete team member
        function deleteMember(index) {
            if (index >= 0 && index < teamMembers.length) {
                const memberName = teamMembers[index].name;
                
                // Confirm deletion
                if (confirm(`Are you sure you want to delete "${memberName}" from the team scheduler?`)) {
                    teamMembers.splice(index, 1);
                    renderTeamGrid();
                    updateMembersList();
                    console.log(`Team member "${memberName}" has been deleted.`);
                }
            }
        }

        // Generate initials from name
        function getInitials(name) {
            return name.split(' ').map(word => word[0]).join('').toUpperCase();
        }

        // Generate random color
        function getRandomColor() {
            const colors = [
                "linear-gradient(135deg, #ff6b6b, #ee5a24)",
                "linear-gradient(135deg, #4ecdc4, #44bd87)",
                "linear-gradient(135deg, #a55eea, #8e44ad)",
                "linear-gradient(135deg, #ffa726, #fb8c00)",
                "linear-gradient(135deg, #26c6da, #00acc1)",
                "linear-gradient(135deg, #ab47bc, #8e24aa)"
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // Render team grid
        function renderTeamGrid() {
            const teamGrid = document.getElementById('teamGrid');
            teamGrid.innerHTML = '';

            teamMembers.forEach((member, index) => {
                const memberCard = document.createElement('div');
                memberCard.className = 'team-member';
                memberCard.onclick = () => openScheduler(member);

                memberCard.innerHTML = `
                    <div class="member-avatar" style="background: ${member.color}">
                        ${member.initials}
                    </div>
                    <div class="member-name">${member.name}</div>
                    <div class="member-role">${member.role}</div>
                    <button class="schedule-btn">Schedule Meeting</button>
                `;

                teamGrid.appendChild(memberCard);
            });
        }

        // Open scheduler modal
        function openScheduler(member) {
            const modal = document.getElementById('schedulerModal');
            const modalTitle = document.getElementById('modalTitle');
            const iframe = document.getElementById('schedulerIframe');

            modalTitle.textContent = `Schedule with ${member.name}`;
            
            // Use member's custom URL or default URL
            const defaultUrl = document.getElementById('defaultUrl').value || 'https://scheduler.zoom.us/d/67zl_unm/customer-success-engineering-consultation/';
            const schedulerUrl = member.url || defaultUrl;
            
            iframe.src.value = schedulerUrl;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            const modal = document.getElementById('schedulerModal');
            const iframe = document.getElementById('schedulerIframe');
            
            modal.style.display = 'none';
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }

        // Extract name from URL ( if needed not in the list)
        function extractNameFromUrl(url) {
            if (!url) return '';
            
            try {
                const urlObj = new URL(url);
                const pathname = urlObj.pathname;
                
                // Common patterns for scheduling services
                const patterns = [
                    // Calendly: calendly.com/john-doe or calendly.com/john.doe
                    /calendly\.com\/([^\/\?]+)/,
                    // Zoom: zoom.us/j/meeting-id/john-doe or zoom.com/my/john-doe
                    /zoom\.(us|com)\/.*?\/([^\/\?]+)/,
                    // Generic: any service with /username pattern
                    /\/([^\/\?\#]+)$/,
                    // With subdomain: john.calendly.com
                    /^([^\.]+)\./
                ];
                
                let extractedName = '';
                
                // Try each pattern
                for (const pattern of patterns) {
                    const match = url.match(pattern);
                    if (match && match[1]) {
                        extractedName = match[1];
                        break;
                    }
                }
                
                // Check subdomain pattern
                if (!extractedName) {
                    const subdomainMatch = urlObj.hostname.match(/^([^\.]+)\./);
                    if (subdomainMatch && subdomainMatch[1] && 
                        !['www', 'veracode','app', 'secure', 'book', 'schedule'].includes(subdomainMatch[1].toLowerCase())) {
                        extractedName = subdomainMatch[1];
                    }
                }
                
                if (extractedName) {
                    // Clean up the name
                    extractedName = extractedName
                        .replace(/[-_.]/g, ' ') // Replace hyphens, underscores, dots with spaces
                        .replace(/\+/g, ' ') // Replace plus signs with spaces
                        .split(' ')
                        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()) // Title case
                        .join(' ')
                        .trim();
                }
                
                return extractedName;
            } catch (error) {
                console.log('Error extracting name from URL:', error);
                return '';
            }
        }

        // Auto-fill name when URL is entered
        function handleUrlInput() {
            const urlInput = document.getElementById('newMemberUrl');
            const nameInput = document.getElementById('newMemberName');
            
            const url = urlInput.value.trim();
            if (url && !nameInput.value.trim()) {
                const extractedName = extractNameFromUrl(url);
                if (extractedName) {
                    nameInput.value = extractedName;
                    nameInput.style.backgroundColor = '#e8f5e8'; // Light green to indicate auto-fill
                    setTimeout(() => {
                        nameInput.style.backgroundColor = '';
                    }, 2000);
                }
            }
        }

        // Add new team member
        function addTeamMember() {
            let name = document.getElementById('newMemberName').value.trim();
            const role = document.getElementById('newMemberRole').value.trim();
            const url = document.getElementById('newMemberUrl').value.trim();

            // If no name provided but URL exists, try to extract name from URL
            if (!name && url) {
                name = extractNameFromUrl(url);
                if (name) {
                    document.getElementById('newMemberName').value = name;
                }
            }

            if (!name || !role) {
                alert('Please enter both name and role for the team member. If you provided a URL, make sure it contains a recognizable username.');
                return;
            }

            const newMember = {
                name: name,
                role: role,
                url: url || document.getElementById('defaultUrl').value,
                initials: getInitials(name),
                color: getRandomColor()
            };

            teamMembers.push(newMember);
            renderTeamGrid();
            updateMembersList(); // Update the config list after adding

            // Clear form
            document.getElementById('newMemberName').value = '';
            document.getElementById('newMemberRole').value = '';
            document.getElementById('newMemberUrl').value = '';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('schedulerModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Handle escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // Enter key support for adding members
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const focusedElement = document.activeElement;
                if (focusedElement.id === 'newMemberName' || 
                    focusedElement.id === 'newMemberRole' || 
                    focusedElement.id === 'newMemberUrl') {
                    addTeamMember();
                }
            }
        });

        // Initialize the app
        renderTeamGrid();
    </script>
</body>
</html>
