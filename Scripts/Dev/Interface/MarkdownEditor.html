    <script>
        let allFiles = [];
        let fileContents = new Map();
        let currentFilter = 'all';
        let currentFilePath = null;
        let currentDate = new Date();
        let selectedDate = null;
        let dateFileMap = new Map();
        let calendarVisible = false;
        let currentFilename = null;
        let tasksById = {};
        let rootTaskIds = [];
        const taskList = [];
        //let draggedTaskId = null;
        let dropIndicator = null;

        let draggedTaskId = null;
        let draggedOverTaskId = null;


                
    



        document.getElementById('folderBtn').addEventListener('click', async () => {
            try {
                const dirHandle = await window.showDirectoryPicker();
                await loadFilesFromDirectory(dirHandle);
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('Error opening folder:', err);
                }
            }
        });

        document.getElementById('calendarToggle').addEventListener('click', () => {
            calendarVisible = !calendarVisible;
            const calendarContainer = document.getElementById('calendarContainer');
            const toggleBtn = document.getElementById('calendarToggle');
            
            if (calendarVisible) {
                calendarContainer.style.display = 'block';
                toggleBtn.classList.add('active');
            } else {
                calendarContainer.style.display = 'none';
                toggleBtn.classList.remove('active');
                selectedDate = null;
                renderCalendar();
                renderFiles(allFiles);
            }
        });

        async function loadFilesFromDirectory(dirHandle, basePath = '') {
            allFiles = [];
            fileContents.clear();
            dateFileMap.clear();
            
            await processDirectory(dirHandle, basePath);
            
            buildDateFileMap();
            renderFiles(allFiles);
        }

        function buildDateFileMap() {
            allFiles.forEach(file => {
                const dates = extractDatesFromFilename(file.name);
                dates.forEach(dateStr => {
                    if (!dateFileMap.has(dateStr)) {
                        dateFileMap.set(dateStr, []);
                    }
                    dateFileMap.get(dateStr).push(file);
                });
            });
        }

        function extractDatesFromFilename(filename) {
            const dates = [];
            
            // Remove file extension for cleaner parsing
            const nameWithoutExt = filename.replace(/\.md$/i, '');
            
            // Split by common separators to get segments
            const segments = nameWithoutExt.split(/[-_]/);
            
            // Look for date patterns in the segments
            // Pattern 1: MM-DD-YY or MM-DD-YYYY (consecutive segments)
            for (let i = 0; i < segments.length - 2; i++) {
                const month = parseInt(segments[i]);
                const day = parseInt(segments[i + 1]);
                const yearStr = segments[i + 2];
                let year = parseInt(yearStr);
                
                // Check if it's a valid date
                if (!isNaN(month) && !isNaN(day) && !isNaN(year)) {
                    // Convert 2-digit year to 4-digit
                    if (year < 100) {
                        year += year < 50 ? 2000 : 1900;
                    }
                    
                    if (month >= 1 && month <= 12 && day >= 1 && day <= 31 && year >= 1900 && year <= 2100) {
                        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        if (!dates.includes(dateStr)) {
                            dates.push(dateStr);
                        }
                    }
                }
            }
            
            // Pattern 2: YYYY-MM-DD or YYYYMMDD
            const isoPattern = /(\d{4})[-_]?(\d{2})[-_]?(\d{2})/g;
            let match;
            
            while ((match = isoPattern.exec(nameWithoutExt)) !== null) {
                const year = parseInt(match[1]);
                const month = parseInt(match[2]);
                const day = parseInt(match[3]);
                
                if (month >= 1 && month <= 12 && day >= 1 && day <= 31 && year >= 1900 && year <= 2100) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    if (!dates.includes(dateStr)) {
                        dates.push(dateStr);
                    }
                }
            }
            
            return dates;
        }

        function renderCalendar() {
            const month = currentDate.getMonth();
            const year = currentDate.getFullYear();
            
            document.getElementById('calendarMonth').textContent = 
                currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            // Day labels
            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                const label = document.createElement('div');
                label.className = 'calendar-day-label';
                label.textContent = day;
                grid.appendChild(label);
            });
            
            // Previous month days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                const day = prevMonthDays - i;
                const cell = createDayCell(day, month - 1, year, true);
                grid.appendChild(cell);
            }
            
            // Current month days
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = createDayCell(day, month, year, false);
                
                // Check if today
                if (year === today.getFullYear() && 
                    month === today.getMonth() && 
                    day === today.getDate()) {
                    cell.classList.add('today');
                }
                
                grid.appendChild(cell);
            }
            
            // Next month days
            const remainingCells = 42 - grid.children.length + 7;
            for (let day = 1; day < remainingCells - 6; day++) {
                const cell = createDayCell(day, month + 1, year, true);
                grid.appendChild(cell);
            }
        }

        function createDayCell(day, month, year, isOtherMonth) {
            const cell = document.createElement('div');
            cell.className = 'calendar-day';
            cell.textContent = day;
            
            if (isOtherMonth) {
                cell.classList.add('other-month');
            }

        async function processDirectory(dirHandle, basePath) {

                        path: fullPath,

        function checkFileFeature(content, feature) {
            switch (feature) {
                case 'headers':
                    return /^#{1,6} .+$/m.test(content);
                case 'code':
                    return /```[\s\S]*?```/.test(content) || /`[^`\n]+`/.test(content);
                case 'links':
                    return /\[.+?\]\(.+?\)/.test(content);
                case 'lists':
                    return /^[\*\-\+] .+$/m.test(content) || /^\d+\. .+$/m.test(content);
                case 'tables':
                    return /\|.+\|/.test(content);
                default:
                    return true;
            }
        }

        function getFileStats(content) {

        function convertMarkdownToHtml(md) {
            let html = md;

            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // Headers
            html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Blockquotes
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // Bold and italic
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Images
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width: 100%; height: auto;">');

            // Inline code
            html = html.replace(/`([^`\n]+?)`/g, '<code>$1</code>');

            // Unordered lists
            html = html.replace(/^\* (.+)$/gm, '<ul><li>$1</li></ul>');
            html = html.replace(/^- (.+)$/gm, '<ul><li>$1</li></ul>');
            html = html.replace(/^\+ (.+)$/gm, '<ul><li>$1</li></ul>');
            html = html.replace(/<\/ul>\n<ul>/g, '');

            // Ordered lists
            html = html.replace(/^\d+\. (.+)$/gm, '<ol><li>$1</li></ol>');
            html = html.replace(/<\/ol>\n<ol>/g, '');

            // Tables
            html = html.replace(/\|(.+)\|/g, (match) => {
                const cells = match.split('|').filter(cell => cell.trim());
                const cellTags = cells.map(cell => `<td>${cell.trim()}</td>`).join('');
                return `<tr>${cellTags}</tr>`;
            });
            html = html.replace(/(<tr>[\s\S]+?<\/tr>)/g, '<table>$1</table>');
            html = html.replace(/<\/table>\n<table>/g, '');

            // Horizontal rules
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^\*\*\*$/gm, '<hr>');

            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            html = `<p>${html}</p>`;

            // Clean up empty paragraphs
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]>)/g, '$1');
            html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<table>)/g, '$1');
            html = html.replace(/(<\/table>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ol>)/g, '$1');
            html = html.replace(/(<\/ol>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');

            return html;
        }

      Name: 'Meeting Summary',
      Description__c: summary
      // TODO: include other required fields for TimeCard__c (e.g., Date__c, Hours__c, Project__c)
    };

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify(payload),
        // If you hit CORS issues in a browser, ensure your site is in SF Setup → CORS
      });

      const body = await response.json().catch(() => ({}));

      if (!response.ok) {
        const msg =
          (Array.isArray(body) && body[0]?.message) ||
          body?.message ||
          response.statusText;
        throw new Error(`Salesforce error (${response.status}): ${msg}`);
      }

      alert('Submitted to Salesforce successfully!');
      console.log('Created record:', body); // { id, success: true, errors: [] }

    } catch (err) {

    }

  }

}

function removeDropIndicator() {
  if (dropIndicator && dropIndicator.parentNode) {
    dropIndicator.parentNode.removeChild(dropIndicator);
  }
}

function handleDragStart(e) {
  draggedTaskId = e.currentTarget.dataset.taskId;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  
  const targetElement = e.currentTarget;
  const targetTaskId = targetElement.dataset.taskId;
  
  if (draggedTaskId === targetTaskId) {
    removeDropIndicator();
    return;
  }
  
  const rect = targetElement.getBoundingClientRect();
  const midpoint = rect.top + rect.height / 2;
  const indicator = createDropIndicator();
  
  // Show indicator above or below based on cursor position
  if (e.clientY < midpoint) {
    targetElement.parentNode.insertBefore(indicator, targetElement);
  } else {
    if (targetElement.nextSibling) {
      targetElement.parentNode.insertBefore(indicator, targetElement.nextSibling);
    } else {
      targetElement.parentNode.appendChild(indicator);
    }
  }
  
  return false;
}

function handleDrop(e) {
  e.stopPropagation();
  e.preventDefault();
  
  removeDropIndicator();
  
  const targetElement = e.currentTarget;
  const targetTaskId = targetElement.dataset.taskId;
  
  if (draggedTaskId === targetTaskId) {
    return false;
  }
  
  const draggedIndex = rootTaskIds.indexOf(draggedTaskId);
  const targetIndex = rootTaskIds.indexOf(targetTaskId);
  
  // Remove dragged task from array
  rootTaskIds.splice(draggedIndex, 1);
  
  // Determine new position based on cursor position
  const rect = targetElement.getBoundingClientRect();
  const midpoint = rect.top + rect.height / 2;
  let newIndex = targetIndex;
  
  // Adjust index if dragged item was before target
  if (draggedIndex < targetIndex) {
    newIndex--;
  }
  
  // Insert above or below based on cursor position
  if (e.clientY < midpoint) {
    rootTaskIds.splice(newIndex, 0, draggedTaskId);
  } else {
    rootTaskIds.splice(newIndex + 1, 0, draggedTaskId);
  }
  
  renderTasks();
  return false;
}

function handleDragEnd(e) {
  e.currentTarget.style.opacity = '1';
  removeDropIndicator();
  draggedTaskId = null;
}
