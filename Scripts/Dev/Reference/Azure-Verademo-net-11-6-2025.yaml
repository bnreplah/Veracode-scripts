##########################################################
# Installing Veracode Wrapper
##########################################################

- task: PowerShell@2
  displayName: Installing Veracode API Wrapper
  continueOnError: true
  inputs:
    targetType: 'inline'
    script: |
      New-Item -Path . -Name ".veracode" -ItemType "directory"
      Write-Output "Downloading the latest version of the Veracode Java API"
      $versionstring = curl https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | findstr /r "latest";
      $version = $versionstring.Trim() -replace '<latest>', '' -replace '</latest>', '';
      curl https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/$version/vosp-api-wrappers-java-$version-dist.zip -o .veracode/dist.zip
      Expand-Archive -Path .veracode/dist.zip 

############################################################################################################
# Running Veracode Packager
#############################################################################################################

- task: PowerShell@2
  env:
    VERACODE_API_KEY_ID: $(VERACODE_API_ID)
    VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)
  inputs:
    targetType: 'inline'
    script: |
      veracode package -s  Verademo-Dotnet/ -d -a -o veracode/

- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      ls
      ls veracode/
    


# - task: VSTest@2
#   inputs:
#     platform: '$(buildPlatform)'
#     configuration: '$(buildConfiguration)'

- task: DownloadPipelineArtifact@2
  inputs:
    patterns: '**/*.exe,**/*.dll,**/*.pdb' # ensures Veracode gets the PDB files for Static Analysis

# Add a task here to remove additional runtime files that are not needed for the upload such as the roslyn directory if it is present. Reupload the new artifact and use that artifact for scanning

# This task makes the pipeline build artifacts available in a known location for upload to Veracode
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: 'veracode/'
    artifactName: Static-Artifact


# You can create a duplicate of your artifact here for scanning optimizing the packaging by removing unnecessary third party components and runtime files
# Alternatively you can use the autopackager which does this for you


####################################################################################################
## Veracode SCAN
####################################################################################################

########################################################
# SCA Agent Based scan
########################################################
# https://docs.veracode.com/r/Veracode_SCA_Agent_Commands
# https://docs.veracode.com/r/c_sc_ci_script
- task: PowerShell@2
  displayName: Veracode SCA Scanner
  continueOnError: true
  env:
    SRCCLR_API_TOKEN: $(SRCCLRTOKEN)
  inputs:
    targetType: 'inline' #Before it was looking for powershell script to execute, and the target type by default is filepath
    script: |
      Set-ExecutionPolicy AllSigned -Scope Process -Force
      iex ((New-Object System.Net.WebClient).DownloadString('https://download.srcclr.com/ci.ps1')) 
      srcclr scan --update-advisor --allow-dirty --ws $(WORKSPACE_SLUG) --recursive 
  # make sure to point the SCA Agent at the right location and or remove workspace slug

# note the CI version of the script doesn't install it each time if it is already saved in the path or as an alias depending on the version
#

