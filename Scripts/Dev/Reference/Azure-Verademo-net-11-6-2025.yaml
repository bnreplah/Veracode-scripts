  
# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4
# This is an example of using VeraDemoDotNet test application with the Veracode Static Pipeline scanner.  A Veracode subscription is required.

##  Main Branch

trigger:
- none

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
- task: NuGetToolInstaller@1
  

- task: NuGetCommand@2
  inputs:
    restoreSolution: '$(solution)'

- task: VSBuild@1
  inputs:
    solution: '$(solution)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
    platform: '$(buildPlatform)'
    configuration: 'Debug'

############################################################################################################
# Installing build tools 
#############################################################################################################
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      wget https://aka.ms/vs/17/release/vs_BuildTools.exe
      choco --version
      choco install visualstudio2022buildtools
      msbuild --version

############################################################################################################
# Installing Veracode tools 
############################################################################################################
#########################################################
# Installing Veracode CLI and SCA ABS via Choclatey
#########################################################
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      echo "Installing Veracode CLI Tools via Choclatey"
      choco install srcclr
      choco install veracode-cli
      srcclr test

