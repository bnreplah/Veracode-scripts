# ──────────────────────────────────────────────────────────────────────────────
# TEMPLATE: Veracode Container / Image Security Scan
# SCAN TYPE: Container scanning — analyzes Docker image layers for vulnerabilities
# WHEN:      On image build (push to main) or PR that changes Dockerfile
# RUNTIME:   ~5–20 minutes
# DOCS:      https://docs.veracode.com/r/c_container_scanning
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS:
#   VERACODE_API_ID   - Veracode API Key ID
#   VERACODE_API_KEY  - Veracode API Key Secret
#
# OPTIONAL (for pushing to registry):
#   REGISTRY_USERNAME - Container registry username
#   REGISTRY_TOKEN    - Container registry token/password
# ──────────────────────────────────────────────────────────────────────────────

name: Veracode Container Scan

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile"
      - "Dockerfile.*"
      - ".dockerignore"
      - "docker-compose*.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "Dockerfile.*"
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Docker image to scan (e.g. myapp:latest or registry/myapp:sha)"
        required: false
        type: string

env:
  # CUSTOMIZE: your image name and tag
  IMAGE_NAME: "your-app-name"  # TODO
  IMAGE_TAG: ${{ github.sha }}
  # CUSTOMIZE: container registry (ghcr.io, docker.io, etc.)
  # REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.set-ref.outputs.image_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OPTIONAL: login to container registry
      # - name: Log in to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ env.REGISTRY }}
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build Docker image
        run: |
          # CUSTOMIZE: add build args, build context, etc.
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Save image to tar for scanning
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -o ${{ env.IMAGE_NAME }}-image.tar

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.IMAGE_NAME }}-image.tar
          retention-days: 1

      - id: set-ref
        run: echo "image_ref=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  container-scan:
    name: Veracode Container Scan
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i ${{ env.IMAGE_NAME }}-image.tar

      # ── Option A: Veracode CLI container scan ─────────────────────────────
      - name: Install Veracode CLI
        run: curl -fsS https://tools.veracode.com/veracode-cli/install | sh

      - name: Veracode container scan
        env:
          VERACODE_API_KEY_ID: ${{ secrets.VERACODE_API_ID }}
          VERACODE_API_KEY_SECRET: ${{ secrets.VERACODE_API_KEY }}
        run: |
          ./veracode scan \
            --type image \
            --source ${{ needs.build-image.outputs.image_ref }} \
            --format table
            # CUSTOMIZE: add --project-name, --format json, --output results.json
        continue-on-error: true    # CUSTOMIZE: set to false to fail on findings

      # ── Option B: Veracode Container Security Action ──────────────────────
      # Uncomment below and comment out Option A for the GitHub Action approach
      #
      # - name: Veracode Container Security Scan
      #   uses: veracode/container-security-action@v1
      #   with:
      #     vid: ${{ secrets.VERACODE_API_ID }}
      #     vkey: ${{ secrets.VERACODE_API_KEY }}
      #     image: ${{ needs.build-image.outputs.image_ref }}
      #     # CUSTOMIZE: fail_build: true
      #     # CUSTOMIZE: min_cvss_for_fail: 7.0
      #     # CUSTOMIZE: skip_fixable_only: false

      # ── Option C: Trivy + upload to GitHub Security (free alternative) ────
      # - name: Trivy vulnerability scan
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ needs.build-image.outputs.image_ref }}
      #     format: sarif
      #     output: trivy-results.sarif
      # - uses: github/codeql-action/upload-sarif@v3
      #   with: { sarif_file: trivy-results.sarif }

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-scan-results
          path: "*.json"
        continue-on-error: true
