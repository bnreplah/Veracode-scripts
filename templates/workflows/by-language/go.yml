# ──────────────────────────────────────────────────────────────────────────────
# TEMPLATE: Go + Veracode
# BUILD:     go build → compiled binary, zipped with source
# SCANS:     Pipeline Scan (PR) + Policy Scan (main) + SCA
#
# PACKAGING NOTE:
#   Veracode can scan Go binaries OR zipped Go source.
#   Compiled binary scan: faster, no source visibility.
#   Source zip: recommended for better flaw attribution.
#   See: https://docs.veracode.com/r/compilation_go
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS: VERACODE_API_ID, VERACODE_API_KEY, SRCCLR_API_TOKEN
# CUSTOMIZE: VERACODE_APP_NAME, GO_VERSION, binary name
# ──────────────────────────────────────────────────────────────────────────────

name: Go + Veracode

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  VERACODE_APP_NAME: "YOUR_APP_NAME"   # CUSTOMIZE
  GO_VERSION: "1.22"                   # CUSTOMIZE: 1.21, 1.22, 1.23
  BINARY_NAME: "app"                   # CUSTOMIZE: your binary output name
  BUILD_VERSION: "${{ github.ref_name }}-${{ github.run_number }}"

jobs:
  build:
    name: Go Build & Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: |
          go build \
            -v \
            -o ${{ env.BINARY_NAME }} \
            ./...
            # CUSTOMIZE: ./cmd/myapp/ or specific package path

      # Option A: Scan compiled binary (faster)
      - name: Package binary for scan
        run: |
          zip app.zip ${{ env.BINARY_NAME }}
          echo "Binary artifact: $(du -sh app.zip)"

      # Option B: Scan source (better flaw attribution) — uncomment to use instead
      # - name: Package source for scan
      #   run: |
      #     zip -r app.zip . \
      #       -x "*.git*" \
      #       -x "vendor/*" \
      #       -x "*_test.go" \
      #       -x ".github/*"

      - uses: actions/upload-artifact@v4
        with:
          name: go-artifact
          path: app.zip
          retention-days: 1

  pipeline-scan:
    name: Veracode Pipeline Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: go-artifact }

      - uses: veracode/pipeline-scan-action@v1
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: app.zip
          fail_build: false

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: pipeline-scan-results, path: results.json }

  policy-scan:
    name: Veracode Policy Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: go-artifact }

      - uses: veracode/veracode-uploadandscan-action@master
        with:
          appname: ${{ env.VERACODE_APP_NAME }}
          createprofile: true
          filepath: app.zip
          version: ${{ env.BUILD_VERSION }}
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          deleteincompletescan: "1"
          waitForScan: false

  sca-scan:
    name: Veracode SCA (Go modules)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download modules (for SCA)
        run: go mod download

      - name: SCA Agent Scan
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: curl -sSL https://download.sourceclear.com/ci.sh | sh -s scan --recursive
        continue-on-error: true
