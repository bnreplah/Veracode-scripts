# ──────────────────────────────────────────────────────────────────────────────
# TEMPLATE: Node.js / TypeScript + Veracode
# BUILD:     npm ci + npm run build → zip source + dist
# SCANS:     Pipeline Scan (PR) + Policy Scan (main) + SCA
#
# PACKAGING NOTE:
#   Veracode scans Node.js source. Package all .js files (not node_modules)
#   into a zip. See: https://docs.veracode.com/r/compilation_nodejs
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS: VERACODE_API_ID, VERACODE_API_KEY, SRCCLR_API_TOKEN
# ──────────────────────────────────────────────────────────────────────────────

name: Node.js + Veracode

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  VERACODE_APP_NAME: "YOUR_APP_NAME"   # CUSTOMIZE
  NODE_VERSION: "20"                    # CUSTOMIZE: 18, 20, 22
  BUILD_VERSION: "${{ github.ref_name }}-${{ github.run_number }}"

jobs:
  build:
    name: Node.js Build & Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm              # CUSTOMIZE: yarn or pnpm if applicable

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build 2>/dev/null || true   # CUSTOMIZE: skip if no build step

      # Package source files for Veracode scanning
      # CUSTOMIZE: adjust paths to include/exclude based on your project layout
      - name: Package source for scan
        run: |
          zip -r app.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "test/*" \
            -x "tests/*" \
            -x "spec/*" \
            -x "*.test.*" \
            -x "*.spec.*" \
            -x ".github/*" \
            -x "coverage/*" \
            -x ".nyc_output/*"
          echo "Artifact size: $(du -sh app.zip)"

      - uses: actions/upload-artifact@v4
        with:
          name: node-artifact
          path: app.zip
          retention-days: 1

  pipeline-scan:
    name: Veracode Pipeline Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: node-artifact }

      - uses: veracode/pipeline-scan-action@v1
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: app.zip
          fail_build: false

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: pipeline-scan-results, path: results.json }

  policy-scan:
    name: Veracode Policy Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: node-artifact }

      - uses: veracode/veracode-uploadandscan-action@master
        with:
          appname: ${{ env.VERACODE_APP_NAME }}
          createprofile: true
          filepath: app.zip
          version: ${{ env.BUILD_VERSION }}
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          deleteincompletescan: "1"
          waitForScan: false

  sca-scan:
    name: Veracode SCA (npm dependencies)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: SCA Agent Scan
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: curl -sSL https://download.sourceclear.com/ci.sh | sh -s scan --recursive
        continue-on-error: true
