# ──────────────────────────────────────────────────────────────────────────────
# TEMPLATE: Java (Gradle) + Veracode
# BUILD:     ./gradlew build → build/libs/*.jar or *.war
# SCANS:     Pipeline Scan (PR) + Policy Scan (main)
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS: VERACODE_API_ID, VERACODE_API_KEY
# CUSTOMIZE: VERACODE_APP_NAME, JAVA_VERSION, gradle task
# ──────────────────────────────────────────────────────────────────────────────

name: Java Gradle + Veracode

on:
  push:
    branches: [main, master, "release/**"]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  VERACODE_APP_NAME: "YOUR_APP_NAME"     # CUSTOMIZE
  JAVA_VERSION: "17"                      # CUSTOMIZE: 8, 11, 17, 21
  BUILD_VERSION: "${{ github.ref_name }}-${{ github.run_number }}"

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    outputs:
      artifact_path: ${{ steps.find-artifact.outputs.path }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          ./gradlew build -x test
          # CUSTOMIZE: use 'bootJar' for Spring Boot, 'war' for web apps, etc.

      - name: Find built artifact
        id: find-artifact
        run: |
          ARTIFACT=$(find build/libs/ -name "*.war" -o -name "*.jar" \
            | grep -v "sources\|plain\|javadoc" \
            | head -1)
          echo "Found: $ARTIFACT"
          echo "path=$ARTIFACT" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: gradle-artifact
          path: ${{ steps.find-artifact.outputs.path }}
          retention-days: 1

  pipeline-scan:
    name: Veracode Pipeline Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: gradle-artifact }

      - uses: veracode/pipeline-scan-action@v1
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: ${{ needs.build.outputs.artifact_path }}
          fail_build: false

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: pipeline-scan-results, path: results.json }

  policy-scan:
    name: Veracode Policy Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: gradle-artifact }

      - uses: veracode/veracode-uploadandscan-action@master
        with:
          appname: ${{ env.VERACODE_APP_NAME }}
          createprofile: true
          filepath: ${{ needs.build.outputs.artifact_path }}
          version: ${{ env.BUILD_VERSION }}
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          deleteincompletescan: "1"
          waitForScan: false

  sca-scan:
    name: Veracode SCA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: SCA Scan
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: curl -sSL https://download.sourceclear.com/ci.sh | sh -s scan --recursive
        continue-on-error: true
